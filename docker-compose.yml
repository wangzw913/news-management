version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: news-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: news_v3
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./news-server/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - news-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: news-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - news-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: news-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - news-net

  minio:
    image: minio/minio:latest
    container_name: news-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - news-net

  server:
    build: ./news-server
    container_name: news-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - news-net

  web:
    build: ./news-web
    container_name: news-web
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - news-net

volumes:
  mysql_data:
  redis_data:
  es_data:
  minio_data:

networks:
  news-net:
    driver: bridge
